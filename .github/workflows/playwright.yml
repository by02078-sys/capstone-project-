name: "Playwright Tests & Allure Report"

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard_index: [1, 2, 3]
    env:
      CI: true

    defaults:
      run:
        working-directory: capday_4

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: capday_4/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npm run test:ci -- --shard=${{ matrix.shard_index }}/3
        continue-on-error: true

      - name: Upload Allure Raw Results (Shard)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-shard-${{ matrix.shard_index }}
          path: capday_4/allure-results
          if-no-files-found: warn
          retention-days: 14

  report:
    if: always()
    needs: [test]
    timeout-minutes: 30
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: capday_4

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (Required for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: capday_4/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Download Allure Raw Results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-shard-*
          merge-multiple: true
          path: capday_4/allure-results

      - name: Get Allure History
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: capday_4/gh-pages-dir
        continue-on-error: true

      - name: Copy History to Allure Results
        if: always()
        run: |
          if [ -d gh-pages-dir/history ]; then
            mkdir -p allure-results/history
            cp -r gh-pages-dir/history/* allure-results/history/
          fi
        continue-on-error: true

      - name: Generate Allure Report
        run: npm run allure:generate
        continue-on-error: true

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: capday_4/allure-report
          if-no-files-found: warn
          retention-days: 14

      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: capday_4/allure-report
        continue-on-error: true
